# Example domain config: LINBIT (DRBD / LINSTOR).
# This is ONE example customer of the oss-agent platform. Any project copies this
# file, edits it for their own product, and points oss-agent at it via
# OSS_DOMAIN_FILE — no platform source changes needed.

name = "LINBIT (DRBD/LINSTOR)"
title = "LINBIT knowledge"

persona = '''
You are LINBIT-Ops, an expert SRE copilot for DRBD and LINSTOR software-defined
storage and high-availability clusters.

How you work:
- Reason step by step (ReAct). When you need live cluster state, call the read-only
  probe tools. They are strictly read-only.
- Ground every diagnosis in the knowledge base: call knowledge_search for the
  relevant docs, states, recovery procedures, and source error strings.
- When you recommend a fix, give the exact commands in a fenced code block.

Safety (non-negotiable):
- A deterministic safety wall, independent of you, blocks data-destroying commands
  (--force, --overwrite, wipefs, dd to a device, mkfs, lvremove/lvreduce, vgremove,
  zfs/zpool destroy, linstor *-definition delete, etc.).
- If a fix genuinely requires such a command, do NOT present it as a one-liner to run.
  Explain the risk, the affected volumes, the backup precondition, and state clearly
  that it requires explicit operator confirmation and an unlock key.
'''

entity_types = [
  "Cluster", "Node", "StoragePool", "ResourceGroup", "Resource", "Volume",
  "KernelModule", "ErrorCode", "CLI_Command", "ConfigParameter", "State",
]

relation_types = [
  "DEPLOYED_ON", "CONTAINS", "MANAGES", "DEPENDS_ON", "TRIGGERED_BY",
  "RESOLVES", "MUTUALLY_EXCLUSIVE", "TRIGGERED_IN_STATE", "DEFINED_IN",
]

# Regex sources (TOML literal strings preserve backslashes). Group 1 = message.
error_patterns = [
  '(?:printk|pr_err|pr_warn|pr_crit|dev_err|dev_warn|drbd_err|drbd_warn|drbd_alert|drbd_emerg)\s*\([^"]*"([^"]{8,})"',
  'fprintf\s*\(\s*stderr\s*,\s*"([^"]{8,})"',
  '\blog_(?:err|error|warn|warning|crit)\s*\([^"]*"([^"]{8,})"',
  '\bperror\s*\(\s*"([^"]{6,})"',
  '(?:new\s+\w*Exception|LOG\.(?:error|warn)|errorReporter\.\w+|reportError)\s*\([^"]*"([^"]{8,})"',
]

repos = [
  "https://github.com/LINBIT/drbd",
  "https://github.com/LINBIT/drbd-utils",
  "https://github.com/LINBIT/linbit-documentation",
  "https://github.com/LINBIT/linstor-server",
]

# Deterministic destructive-command blocks (LLM-independent). The platform owns
# the mechanism; these rules are LINBIT-specific. Drop them and nothing is blocked.
[[red_lines]]
id = "drbd-primary-force"
severity = "CRITICAL"
pattern = '\bdrbdadm\b.*\bprimary\b.*--force'
reason = "drbdadm primary --force can force-promote, overwriting the peer and causing split-brain"

[[red_lines]]
id = "flag-overwrite"
severity = "HIGH"
pattern = '--overwrite'
reason = "--overwrite-data-of-peer overwrites the peer with the local copy"

[[red_lines]]
id = "drbd-invalidate"
severity = "CRITICAL"
pattern = '\bdrbdadm\b.*\binvalidate'
reason = "drbdadm invalidate discards local data and triggers a full resync"

[[red_lines]]
id = "wipefs"
severity = "CRITICAL"
pattern = '\bwipefs\b'
reason = "wipefs erases filesystem signatures; data irreversibly lost"

[[red_lines]]
id = "dd-to-device"
severity = "CRITICAL"
pattern = '\bdd\b.*\bof=/dev/'
reason = "dd to a block device overwrites raw disk data"

[[red_lines]]
id = "mkfs"
severity = "CRITICAL"
pattern = '\bmkfs(\.\w+)?\b'
reason = "mkfs rebuilds a filesystem, wiping the target device"

[[red_lines]]
id = "lvremove"
severity = "CRITICAL"
pattern = '\blvremove\b'
reason = "lvremove deletes a logical volume; DRBD data on it is lost"

[[red_lines]]
id = "vgremove"
severity = "CRITICAL"
pattern = '\bvgremove\b'
reason = "vgremove deletes a volume group"

[[red_lines]]
id = "zfs-destroy"
severity = "CRITICAL"
pattern = '\bzfs\b.*\bdestroy\b'
reason = "zfs destroy deletes a dataset/volume/snapshot"

[[red_lines]]
id = "zpool-destroy"
severity = "CRITICAL"
pattern = '\bzpool\b.*\bdestroy\b'
reason = "zpool destroy destroys an entire storage pool"

[[red_lines]]
id = "linstor-delete-def"
severity = "CRITICAL"
pattern = '\blinstor\b.*\b(resource-definition|volume-definition|resource-group|storage-pool)\b.*\b(delete|drop)\b'
reason = "linstor *-definition delete removes resource/volume definitions and underlying storage"

[[probes]]
name = "drbd_status"
description = "Run `drbdadm status` — DRBD resource roles, connection states and disk states."
argv = ["drbdadm", "status"]

[[probes]]
name = "proc_drbd"
description = "Read /proc/drbd — raw kernel-module view of DRBD devices."
argv = ["cat", "/proc/drbd"]

[[probes]]
name = "linstor_node_list"
description = "List LINSTOR nodes and their online/offline status."
argv = ["linstor", "node", "list"]

[[probes]]
name = "linstor_resource_list"
description = "List LINSTOR resources across nodes with state flags."
argv = ["linstor", "resource", "list"]

[[probes]]
name = "linstor_storage_pool_list"
description = "List LINSTOR storage pools with free/total capacity."
argv = ["linstor", "storage-pool", "list"]

[[probes]]
name = "linstor_error_report_list"
description = "List recent LINSTOR controller error reports."
argv = ["linstor", "error-report", "list"]

[[probes]]
name = "lsblk"
description = "Show host block devices and topology."
argv = ["lsblk"]

[[probes]]
name = "vgs"
description = "Show LVM volume groups and free space."
argv = ["vgs"]

[[probes]]
name = "zpool_status"
description = "Show ZFS pool health and device status."
argv = ["zpool", "status"]
